<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*switch
        - Date() 객체 : 날짜와 시간을 다루는 객체
        - 
        */
      //Date() 객체를 통해서 now라는 인스턴스 객체 생성
      const now = new Date();
      console.log(now);
      const dayName = now.getDay(); //getDay는 요일을 숫자로 가져오고 월요일이 1이 된다. 일요일 = 0;
      //console.log(dayName)

      switch (dayName) {
        case 0:
          console.log("일요일 입니다");
          break;
        case 1:
          console.log("월요일 입니다");
          break;
        case 2:
          console.log("화요일 입니다");
          break;
        case 3:
          console.log("수요일 입니다");
          break;
        case 4:
          console.log("목요일 입니다");
          break;
        case 5:
          console.log("금요일 입니다");
          break;
        case 6:
          console.log("토요일 입니다");
          break;

        default:
          console.log("요일이 아닙니다.");
      }

      const day = ["일", "월", "화", "수", "목", "금", "토"];
      console.log(day[dayName] + "요일 입니다.");
    </script>
  </body>
</html>
