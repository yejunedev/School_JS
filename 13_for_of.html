    <title>Document</title>

  <body>
    <script>
      //for ~ of : 배열, 문자열에서 많이 사용

      let brands = [
        "애플",
        "구글",
        "마이크로소프트",
        "삼성",
        "아마존",
        "테슬라",
      ];
      for (const brand of brands) {
        console.log(brand);
      }
      //2.문자열
      let lang = "JavaScript";
      for (const char of lang) {
        console.log(char);
      }

      let nums = 9988475037;
      let numToStr = nums.toString(); //숫자를 문자열로 바꾸기
      for (const num of numToStr) {
        console.log(typeof num);
      }
    </script>
