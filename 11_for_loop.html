    <script>
      /*statement : 코드 블록을 실행하기 전에 무조건 한 번 실행하는 초기화 문장
        statement2 : 코드 블록을 실행시킬 조건절
        statement3 : 코드 블록을 실행되는 횟수 증가 코드
        1 => 2 => 참 코드실행 => 3 => 2 => 참 코드 실행 => 3 => 2 => 참 코드실행 => 3 => 2....

        */

        "마이크로소프트",

        "아마존",
        "테슬라",
      ];
      //console.log(brands[0]);
      //console.log(brands[1]);
      //console.log(brands[2]);
      //console.log(brands[3]);
      //console.log(brands[4]);
      //console.log(brands[5]);
      //for
      for (let i = 0; i < brands.length; i++) {
        console.log(brands[i]);
      }
      //실습 : 자판기에서 음료를 구입하는 프로그램 작성
      //(돈이 들어오면 구입이 가능한 음료수 목록 보여주기)
      const drinkList = [
        { name: "오렌지", price: 1000 },
        { name: "파워에이드", price: 1200 },
        { name: "커피", price: 700 },
        { name: "보리음료", price: 1200 },
        { name: "코카콜라", price: 1800 },
      ];
      let inputCoin = 1000;
      let drinkSize = drinkList.length;
      let availableDrink = []; //구입 가능한 음료수 종류 배열

      for (let i = 0; i < drinkSize; i++) {
        let drink = drinkList[i]; //원배열에서 객체를 하나씩 불러와 임시저장하는 변수
        if (inputCoin >= drink.price) {
          console.log("구입가능한 음료 : " + drink.name);
        }
      }

      //break
      for (let i = 0; i < 10; i++) {
        if (i == 5);
        {
          break;
        }
        console.log(i);
      }

      //continue
      for (let i = 0; i < 10; i++) {
        if (i == 5);
        {
          continue;
        }
        console.log(i);
      }
