<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let brands = [
        "애플",
        "구글",
        "마이크로소프트",
        "삼성",
        "아마존",
        "테슬라",
      ];
      //for ~ in  객체에서 많이 사용, 배열에서 사용할 경우 => 초기화, 조건, 증가식이 없어도 순회
      //1. 배열에서 사용
      for (const i in brands) {
        //i:인덱스
        console.log(i);
        console.log(brands[i]);
      }
      //2.객체에서 사용
      let person = {
        name: "홍길동",
        age: 22,
        tel: "010-0000-1111",
        city: "Seoul",
      };
      for (const key in person) {
        console.log(key);
        //2-2 값 출력
      }
      for (const key in person) {
        console.log(person[key]);
      }

      //알고 싶은 키를 입력받고, 키에 대한 값을 출력하는 코드(빈 칸은 체크)
      let kValue = prompt("키를 입력하세요");
      for (const key in person) {
        if (kValue === key) {
          console.log(person[key]);
        } else if (kValue === "" || kValue === null) {
          console.log("다시 입력하세요");
        }
      }
    </script>
  </body>
</html>
