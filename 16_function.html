      /* 1.함수 선언 방식
        function 함수이름(매개변수....){
            :
            (return)
        } 
            -선언 전 호출이 가능하다.
            -브라우저 엔진이 메모리 로딩하는 순서  
            1. 선언함수  2. 전역변수 나머지는 코드 순서대로

            */
      console.log(sum(4, 8)); //호출
      function sum(n1, n2) {
        //선언
        return n1 + n2;
      }
      console.log(sum(4, 8)); //호출
